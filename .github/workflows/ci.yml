name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate-node:
    name: Validate Node.js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  validate-rust-wasm:
    name: Validate Rust/Wasm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faas
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1, x86_64-unknown-linux-musl

      - name: Install native build tools
        run: sudo apt-get update && sudo apt-get install -y clang protobuf-compiler musl-tools

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: faas

      - name: Install cargo-component
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-component

      - name: Install Cargo security tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Audit dependencies
        run: cargo audit --deny warnings

      - name: Check dependency policy
        run: cargo deny check

      - name: Clippy Wasm components
        run: >
          cargo clippy
          -p nebula-eval-ast
          -p nebula-dataset-forge
          -p nebula-economic-governor
          -p nebula-semantic-deduplicator
          -p nebula-tenant-router
          --target wasm32-wasip1
          -- -D warnings

      - name: Test
        run: cargo test --workspace
